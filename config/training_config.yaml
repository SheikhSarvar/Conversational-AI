model:
  name: "meta-llama/Llama-3.2-1B-Instruct"
  max_length: 512
  temperature: 0.7
  top_p: 0.9
  top_k: 50

training:
  output_dir: "./models/techbot-finetuned"
  num_train_epochs: 25
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_steps: 100
  logging_steps: 10
  eval_steps: 100
  save_steps: 500
  save_total_limit: 3
  fp16: true
  gradient_checkpointing: true
  optim: "paged_adamw_8bit"
  
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

data:
  train_file: "data/train/tech_qa_train.json"
  validation_file: "data/validation/tech_qa_val.json"
  test_file: "data/test/tech_qa_test.json"
  max_seq_length: 512
  train_val_split: 0.9
  
preprocessing:
  remove_duplicates: true
  min_length: 20
  max_length: 2048
  language: "en"
